name: RSS 데이터 자동 업데이트

on:
  schedule:
    # 매일 오전 9시 (KST) = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:  # GitHub Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install feedparser

      - name: RSS 수집 실행
        run: python fetch_rss.py

      - name: 변경사항 커밋 및 푸시
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: RSS 데이터 자동 업데이트 (${{ steps.date.outputs.date }})"
          add: "data/posts.json"
          default_author: github_actions
